# Sincronización horaria contra Google Business Profile API
#
# Por qué este workflow existe:
#   Vercel Hobby solo permite crons diarios. Para traer reseñas casi en tiempo
#   real disparamos el endpoint del cron cada hora desde GitHub Actions.
#
# Fuente: Business Profile API (caso 5-5855000041022, cuota concedida
#   2026-06-10). Sustituye a Places API como fuente única — ver CLAUDE.md
#   §4.26 / §4.50. El cron solo importa reseñas creadas a partir del corte de
#   activación (BP_GO_LIVE_AT), no el histórico.
#
# Cuándo se ejecuta:
#   Cada hora a y media (las 30 del minuto), entre las 06:00 y las 23:00 UTC.
#   El endpoint es idempotente (unique location_id+google_review_id) y tiene
#   lock optimista de 60s contra el cron diario de Vercel.
#
# Secrets necesarios (Repository Settings → Secrets and variables → Actions):
#   - APP_URL    → https://resenas.marinadorconstrucciones.com
#   - CRON_SECRET → mismo valor que la env var de Vercel
#
# Si quieres ejecutarlo a demanda: pestaña Actions → "Sync reviews hourly" →
# "Run workflow".

name: Sync reviews hourly

on:
  schedule:
    # cron en UTC: minuto 30 de cada hora entre las 06 y las 23 UTC.
    # Cubre el día completo de actividad en España (08-01 hora local).
    - cron: "30 6-23 * * *"
  workflow_dispatch: # botón manual disponible en la pestaña Actions

concurrency:
  # Si una ejecución se cruza con otra (lenta), la nueva espera a que la
  # anterior termine. El lock optimista del endpoint también lo cubriría,
  # pero esto evita llamadas duplicadas innecesarias.
  group: sync-reviews
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call Business Profile sync endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Faltan secrets APP_URL o CRON_SECRET en GitHub."
            exit 1
          fi
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/sync-google-reviews")
          status=$(echo "$response" | tail -n1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')
          echo "HTTP $status"
          echo "$body" | head -c 2000
          if [ "$status" != "200" ]; then
            echo "::error::Endpoint devolvió $status"
            exit 1
          fi
