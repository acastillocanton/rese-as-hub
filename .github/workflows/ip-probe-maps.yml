# [TEMPORAL — BORRAR tras el spike] Test de IP de datacenter contra Google Maps
#
# Comprueba si los endpoints públicos de Google Maps (página de ficha +
# feed interno de reseñas) responden desde una IP de GitHub Actions
# (datacenter) o si Google devuelve consent/captcha/429. Es el paso 0.4 del
# plan de "enlace directo a reseña": determina si el enriquecimiento puede
# correr en la nube o necesita otro runner.
#
# Disparar a mano: pestaña Actions → "IP probe maps" → Run workflow.

name: IP probe maps

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe Maps place page + reviews feed from datacenter IP
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          COOKIE="SOCS=CAESEwgDEgk0ODE3Nzk3MjQaAmVuIAEaBgiA_LyaBg; CONSENT=YES+cb.20210720-07-p0.en+FX+410"
          PLACE_ID="ChIJUxEQ5J9IYA0R6AgZLMFPF-k"  # Oropesa

          echo "=== 1) Página de ficha (resolución de FID) ==="
          curl -sS -L -A "$UA" --cookie "$COOKIE" \
            "https://www.google.com/maps/place/?q=place_id:${PLACE_ID}&hl=es&gl=ES" \
            -o place.html -w "HTTP %{http_code} bytes=%{size_download} url=%{url_effective}\n"
          echo "--- ¿consent wall? (esperado: vacío) ---"
          grep -oiE 'consent\.google\.com|recaptcha|unusual traffic|/sorry/' place.html | sort -u | head
          echo "--- FID extraído (esperado: 0x...:0x...) ---"
          FID=$(grep -oE '0x[0-9a-f]{8,}:0x[0-9a-f]{8,}' place.html | sort | uniq -c | sort -rn | head -1 | grep -oE '0x[0-9a-f]+:0x[0-9a-f]+')
          echo "FID=$FID"

          echo "=== 2) Feed interno listugcposts ==="
          ENC=$(printf '%s' "$FID" | sed 's/:/%3A/')
          PB="!1m6!1s${ENC}!6m4!4m1!1e1!4m1!1e3!2m2!1i20!2s!5m2!1soY9!7e81!8m9!2b1!3b1!5b1!7b1!12m4!1b1!2b1!4m1!1e1!11m0!13m1!1e2"
          curl -sS -A "$UA" --cookie "$COOKIE" \
            "https://www.google.com/maps/rpc/listugcposts?authuser=0&hl=es&gl=ES&pb=${PB}" \
            -o ugc.txt -w "HTTP %{http_code} bytes=%{size_download}\n"
          echo "--- primeros 200 bytes (esperado: prefijo )]}' + arrays) ---"
          head -c 200 ugc.txt
          echo ""
          echo "--- ¿consent/captcha en el feed? (esperado: vacío) ---"
          grep -oiE 'consent\.google\.com|recaptcha|unusual traffic|/sorry/' ugc.txt | sort -u | head

          echo "=== 3) Expansión de un share-link conocido ==="
          curl -sI -L -A "$UA" "https://maps.app.goo.gl/TDaDGXzC38nk34A76" \
            -o /dev/null -w "final_url_status=%{http_code}\n" --max-redirs 5

          echo "=== VEREDICTO ==="
          if [ -n "$FID" ]; then echo "FID OK desde datacenter"; else echo "FID NO resuelto (posible bloqueo)"; fi
