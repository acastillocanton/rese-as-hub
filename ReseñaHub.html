<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>ReseñaHub — Gestión interna de reseñas</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: #F5F5F7;
    --surface: #FFFFFF;
    --surface-2: #FAFAFB;
    --line: #E5E5EA;
    --line-strong: #D2D2D7;
    --ink: #1D1D1F;
    --ink-2: #515154;
    --ink-3: #6E6E73;
    --ink-4: #86868B;
    --ink-5: #AEAEB2;
    --ok: #2D7D46;
    --ok-bg: #E8F0EB;
    --warn-bg: #F4ECDB;
    --warn: #8A6A1E;
    --gold: #B58A2C;
    --ios-bg: #F2F2F7;
    --radius: 14px;
    --radius-sm: 10px;
    --radius-lg: 20px;
    --shadow-card: 0 1px 0 rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.04);
    --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
    --font-text: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
  }
  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; background:#EDEDF0; color:var(--ink); font-family:var(--font-text); -webkit-font-smoothing:antialiased; }
  body{ letter-spacing:-0.01em; }

  /* Top nav for switching screens (replaces the design-canvas wrapper) */
  .nav{
    position:sticky; top:0; z-index:50;
    background:rgba(237,237,240,0.85);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{
    max-width:1440px; margin:0 auto;
    display:flex; align-items:center; gap:18px;
    padding:10px 20px;
  }
  .nav-brand{
    display:flex; align-items:center; gap:10px;
    font-weight:600; font-size:14px; letter-spacing:-0.015em;
  }
  .nav-brand .logo{
    width:24px; height:24px; border-radius:7px;
    background:#1D1D1F; color:#fff;
    display:grid; place-items:center; font-weight:700; font-size:12px;
  }
  .nav-tabs{
    display:flex; gap:2px; padding:3px;
    background:#E2E2E7; border-radius:9px;
    margin-left:8px;
  }
  .nav-tab{
    padding:6px 12px; border-radius:7px;
    font-size:12.5px; font-weight:500; color:var(--ink-3);
    cursor:pointer; user-select:none;
    border:none; background:transparent; font-family:inherit;
    letter-spacing:-0.005em;
  }
  .nav-tab.active{ background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,0.08); }
  .nav-meta{ margin-left:auto; color:var(--ink-4); font-size:12px; }

  /* Stage container: faithful to the 1440-wide design */
  .stage{
    max-width:1440px; margin:0 auto;
    padding:18px 20px 40px;
  }
  .artboard{
    width:var(--ab-w, 1440px);
    height:var(--ab-h, 1024px);
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 1px 0 rgba(0,0,0,0.03), 0 14px 40px -20px rgba(0,0,0,0.18);
    margin:0 auto;
  }
  /* Light horizontal scroll when viewport < 1440 */
  @media (max-width: 1480px){
    .stage{ padding:18px 0 40px; overflow-x:auto; }
  }

  /* tiny utilities used across screens */
  .h-rule{ height:1px; background:var(--line); width:100%; }
  .mono{ font-family:var(--font-mono); }
  .tabular{ font-variant-numeric:tabular-nums; }
  .pill{
    display:inline-flex; align-items:center; gap:6px;
    padding:3px 8px; border-radius:999px;
    font-size:11px; font-weight:500; color:var(--ink-3);
    background:#F2F2F4; border:1px solid var(--line);
  }
  .pill.ok{ background:var(--ok-bg); color:var(--ok); border-color:transparent; }
  .pill.warn{ background:var(--warn-bg); color:var(--warn); border-color:transparent; }
  .dot{ width:6px; height:6px; border-radius:999px; background:currentColor; display:inline-block; }
  button{ font:inherit; }
</style>
</head>

/* ---------- Sparkline & Bars ---------- */

function Sparkline({ data, width=120, height=32, stroke='var(--ink-2)' }){
  const min = Math.min(...data), max = Math.max(...data);
  const span = max - min || 1;
  const pts = data.map((v,i) => {
    const x = (i/(data.length-1)) * width;
    const y = height - ((v-min)/span) * (height-4) - 2;
    return [x,y];
  });
  const d = pts.map((p,i) => (i?'L':'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const last = pts[pts.length-1];
  return (
    <svg width={width} height={height}>
      <path d={d} fill="none" stroke={stroke} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={last[0]} cy={last[1]} r="2.5" fill={stroke} />
    </svg>
  );
}

function MonthBars({ data, labels, height=200, highlight=null }){
  const max = Math.max(...data);
  return (
    <div style={{display:'flex', alignItems:'flex-end', gap:8, height, padding:'0 4px'}}>
      {data.map((v,i) => {
        const h = (v/max) * (height-28);
        const isHi = highlight === i;
        return (
          <div key={i} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:8}}>
            <div style={{fontSize:10.5, color: isHi ? 'var(--ink)' : 'var(--ink-4)', fontVariantNumeric:'tabular-nums', fontWeight: isHi?600:400}}>{v}</div>
            <div style={{
              width:'100%', height:h, minHeight:2,
              background: isHi ? 'var(--ink)' : '#D6D6DB',
              borderRadius:4,
              transition:'background .2s'
            }}/>
            <div style={{fontSize:10.5, color:'var(--ink-4)', textTransform:'uppercase', letterSpacing:'0.05em'}}>{labels[i]}</div>
          </div>
        );
      })}
    </div>
  );
}

function AreaChart({ enviados, conseguidos, labels, height=210 }){
  const w = 760;
  const h = height;
  const padL = 28, padR = 12, padT = 14, padB = 22;
  const innerW = w - padL - padR, innerH = h - padT - padB;
  const max = Math.max(...enviados, ...conseguidos);
  const niceMax = Math.ceil(max/10)*10;
  const xOf = i => padL + (i/(enviados.length-1)) * innerW;
  const yOf = v => padT + innerH - (v/niceMax) * innerH;
  const path = (arr) => arr.map((v,i) => (i?'L':'M') + xOf(i).toFixed(1) + ' ' + yOf(v).toFixed(1)).join(' ');
  const area = (arr) => path(arr) + ` L ${xOf(arr.length-1)} ${padT+innerH} L ${xOf(0)} ${padT+innerH} Z`;
  const ticks = [0, niceMax/2, niceMax];
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%', height:'auto', display:'block'}}>
      <defs>
        <linearGradient id="g-cons" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="#1D1D1F" stopOpacity="0.10"/>
          <stop offset="100%" stopColor="#1D1D1F" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {ticks.map((t,i) => (
        <g key={i}>
          <line x1={padL} x2={w-padR} y1={yOf(t)} y2={yOf(t)} stroke="#E5E5EA" strokeDasharray="2 4"/>
          <text x={padL-8} y={yOf(t)+3} textAnchor="end" fontSize="10" fill="#86868B" fontFamily="var(--font-mono)">{t}</text>
        </g>
      ))}
      {labels.map((l,i) => (
        <text key={i} x={xOf(i)} y={h-6} textAnchor="middle" fontSize="10" fill="#86868B">{l}</text>
      ))}
      <path d={area(conseguidos)} fill="url(#g-cons)" />
      <path d={path(enviados)} fill="none" stroke="#AEAEB2" strokeWidth="1.3" strokeDasharray="3 3"/>
      <path d={path(conseguidos)} fill="none" stroke="#1D1D1F" strokeWidth="1.6"/>
      {conseguidos.map((v,i) => (
        <circle key={i} cx={xOf(i)} cy={yOf(v)} r="2.5" fill="#1D1D1F"/>
      ))}
    </svg>
  );
}

/* ---------- Stars & misc ---------- */

function Avatar({ name='', size=36, color }){
  const initials = name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();

  const h = hashes[(name.charCodeAt(0) || 65) % hashes.length];
  return (
    <div style={{
      width:size, height:size, borderRadius:999,
      background: color || h,
      color:'#3C3C43',

      letterSpacing:'-0.02em',

}

function Progress({ value, max=100, height=4, tone='ink' }){
  const pct = Math.min(100, (value/max)*100);
  const fg = tone === 'ok' ? 'var(--ok)' : 'var(--ink)';
  return (
    <div style={{height, background:'#E5E5EA', borderRadius:999, overflow:'hidden'}}>
      <div style={{width: pct+'%', height:'100%', background:fg, borderRadius:999}}/>

}

function Seg({ options, value, onChange }){

}

function Badge({ children }){

      display:'inline-flex', alignItems:'center', gap:6,
      padding:'5px 9px', borderRadius:7,
      background:'var(--surface-2)', border:'1px solid var(--line)',

    }}>
      <span style={{width:5, height:5, borderRadius:999, background:'var(--ink-3)'}}/>
      {children}
    </span>
  );

function QRPlaceholder(){
  const cells = useMemo(() => {
    const seed = 42;
    const rnd = (n) => ((Math.sin(seed*n*97.13)+1)/2);
    const out = [];
    for(let y=0;y<13;y++){
      for(let x=0;x<13;x++){
        const corner = (x<3&&y<3)||(x>9&&y<3)||(x<3&&y>9);
        const center = x>=5&&x<=7&&y>=5&&y<=7;
        out.push({x,y,on: corner || center ? true : rnd(y*13+x) > 0.55});
      }
    }
    return out;
  }, []);
  const cs = 8, pad = 6;
  const size = 13*cs + pad*2;
  return (
    <div style={{padding:10, border:'1px solid var(--line-strong)', borderRadius:10, background:'#fff'}}>
      <svg width={size} height={size} style={{display:'block'}}>
        <rect width={size} height={size} fill="#fff"/>
        {cells.map((c,i) => c.on && (
          <rect key={i} x={pad + c.x*cs} y={pad + c.y*cs} width={cs} height={cs} fill="#1D1D1F"/>
        ))}
      </svg>
      <div style={{textAlign:'center', fontSize:10.5, color:'var(--ink-4)', marginTop:6, fontFamily:'var(--font-mono)'}}>c/carla-ruiz</div>
    </div>
  );
}

function Ring({ value, max, size=120 }){
  const r = size/2 - 8;
  const c = 2 * Math.PI * r;
  const pct = Math.min(1, value/max);
  return (
    <svg width={size} height={size} style={{display:'block'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E5EA" strokeWidth="6"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1D1D1F" strokeWidth="6"
        strokeDasharray={`${c*pct} ${c}`}
        strokeDashoffset={c*0.25}
        transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{strokeLinecap:'round'}}
      />
      <text x={size/2} y={size/2-2} textAnchor="middle" fontSize="22" fontWeight="600" fill="#1D1D1F" fontFamily="var(--font-display)" style={{letterSpacing:'-0.02em'}}>
        {Math.round(pct*100)}%
      </text>
      <text x={size/2} y={size/2+16} textAnchor="middle" fontSize="10.5" fill="#86868B" style={{textTransform:'uppercase', letterSpacing:'0.05em'}}>
        objetivo
      </text>
    </svg>
  );
}

function Evidence({ label, detail, weight }){
  return (
    <div style={{
      padding:'10px 12px',
      border:'1px solid var(--line)',
      borderRadius:10,
      background:'var(--surface-2)'

        <span style={{fontSize:12.5, fontWeight:600}}>{label}</span>
        <span style={{fontFamily:'var(--font-mono)', fontSize:11, color:'var(--ink-4)'}}>{weight}</span>
      </div>
      <div style={{marginTop:4, fontSize:12, color:'var(--ink-3)', lineHeight:1.5}}>{detail}</div>
    </div>
  );
}

function BellPill({ count }){
  return (
    <div aria-label={`Notificaciones${count ? ', '+count+' sin leer' : ''}`} style={{
      position:'relative',
      width:36, height:36, borderRadius:999,
      background:'#fff',
      display:'grid', placeItems:'center',
      color:'var(--ink-2)',
      boxShadow:'0 1px 2px rgba(0,0,0,0.05)'
    }}>
      <span aria-hidden="true" style={{fontSize:16}}>♪</span>
      {count > 0 && (
        <span style={{
          position:'absolute', top:-2, right:-2,
          minWidth:16, height:16, padding:'0 4px',
          borderRadius:999, background:'var(--ink)', color:'#fff',
          fontSize:10, fontWeight:600,
          display:'grid', placeItems:'center',
          border:'2px solid var(--ios-bg)'
        }}>{count}</span>
      )}
    </div>
  );
}

function MobileBtn({ children, primary, small }){
  return (
    <button style={{
      width:'100%',
      padding: small ? '9px 0' : '13px 0',
      borderRadius:12,
      border: primary ? 'none' : '1px solid var(--line-strong)',
      background: primary ? 'var(--ink)' : '#fff',
      color: primary ? '#fff' : 'var(--ink)',
      fontSize: small ? 13 : 14.5, fontWeight:600,
      letterSpacing:'-0.01em',
      cursor:'pointer'
    }}>{children}</button>
  );
}

function MobileTile({ big, label, tone }){
  const accent = tone === 'ok' ? 'var(--ok)' : 'var(--ink)';
  return (
    <div style={{
      padding:'14px 12px',
      background:'#fff',
      borderRadius:14,
      boxShadow:'0 1px 2px rgba(0,0,0,0.04)'
    }}>
      <div style={{
        fontFamily:'var(--font-display)',
        fontSize:26, fontWeight:600,
        letterSpacing:'-0.025em',
        fontVariantNumeric:'tabular-nums',
        color:accent, lineHeight:1
      }}>{big}</div>
      <div style={{marginTop:6, fontSize:11.5, color:'var(--ink-3)', lineHeight:1.3}}>{label}</div>
    </div>
  );
}

function MobileTabBar(){
  const items = [
    ['Panel',   '◧', true],
    ['Enlace',  '⊕', false],
    ['Reseñas', '★', false],
    ['Ranking', '◑', false],
  ];
  return (
    <nav aria-label="Navegación principal" style={{
      borderTop:'1px solid var(--line)',
      background:'rgba(248,248,250,0.92)',
      backdropFilter:'blur(20px)',
      WebkitBackdropFilter:'blur(20px)',
      padding:'10px 12px 30px',
      display:'flex', justifyContent:'space-around'
    }}>
      {items.map(([l,icon,on],i) => (
        <div key={i} aria-current={on ? 'page' : undefined} style={{
          display:'flex', flexDirection:'column', alignItems:'center', gap:2,
          color: on ? 'var(--ink)' : 'var(--ink-4)',
          fontWeight: on ? 600 : 500
        }}>
          <span aria-hidden="true" style={{fontSize:18}}>{icon}</span>
          <span style={{fontSize:10.5}}>{l}</span>
        </div>
      ))}
    </nav>
  );
}

<script type="text/babel">
const { useState } = React;
const {
  AdminDashboard, SalespeopleList, SalespersonProfile,
  SalespersonSelf, SalespersonMobile, VerificationScreen
} = window;

const SCREENS = [
  { id:'dashboard',    label:'Dashboard',       Component:AdminDashboard,     w:1440, h:1024 },
  { id:'list',         label:'Comerciales',     Component:SalespeopleList,    w:1440, h:1024 },
  { id:'profile',      label:'Ficha comercial', Component:SalespersonProfile, w:1440, h:1024 },
  { id:'self',         label:'Vista comercial', Component:SalespersonSelf,    w:1440, h:1024 },
  { id:'mobile',       label:'Vista móvil',     Component:SalespersonMobile,  w:580,  h:1024 },
  { id:'verification', label:'Verificación',    Component:VerificationScreen, w:1440, h:1024 },
];

function App(){
  const [active, setActive] = useState(SCREENS[0].id);
  const current = SCREENS.find(s => s.id === active) || SCREENS[0];
  const Active = current.Component;
  return (
    <div>
      <div className="nav">
        <div className="nav-inner">
          <div className="nav-brand">
            <span className="logo">r</span>
            <span>ReseñaHub</span>
          </div>
          <div className="nav-tabs" role="tablist">
            {SCREENS.map(s => (
              <button
                key={s.id}
                role="tab"
                aria-selected={active===s.id}
                className={'nav-tab' + (active===s.id ? ' active' : '')}
                onClick={() => setActive(s.id)}
              >{s.label}</button>
            ))}
          </div>
          <div className="nav-meta">Grupo Habitar · interno</div>
        </div>
      </div>

      <div className="stage">
        <div className="artboard" style={{'--ab-w': current.w+'px', '--ab-h': current.h+'px'}}>
          <Active />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
